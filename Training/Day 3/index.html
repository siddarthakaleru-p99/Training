<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P99SOFT</title>

    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        header {
            width: 100%;
            background-color: goldenrod;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
        }

        .menu_items {
            display: flex;
            gap: 10px;
        }

        .menu_items li {
            list-style: none;
        }

        .layout {
            display: flex;
        }

        aside {
            width: 220px;
            height: calc(100vh - 100px);
            background-color: sienna;
            color: white;
            padding: 15px;
        }

        .content {
            width: 100%;
            background-color: beige;
            padding: 20px;
        }

        footer {
            background-color: lightgreen;
            width: 100%;
            height: 40px;
            text-align: center;
            padding-top: 10px;
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header>
        <nav>
            <div class="logo">
                <img src="logo.jpg" alt="P99SOFT" width="50">
            </div>
            <ul class="menu_items">
                <li>Home</li>
                <li>Contact</li>
                <li>Help</li>
            </ul>
        </nav>
    </header>

    <!-- MAIN LAYOUT -->
    <div class="layout">

        <!-- SIDEBAR -->
        <aside>
            <h3>Menu</h3>
            <ul>
                <li>Dashboard</li>
                <li>Profile</li>
                <li>Settings</li>
            </ul>
        </aside>

        <!-- CONTENT -->
        <div class="content">

            <!-- GRID (Tailwind from 2nd code) -->
            <div class="grid grid-cols-3 gap-6">
                <div class="bg-orange-300 row-span-2 min-h-[150px] rounded-xl"></div>
                <div class="bg-orange-300 h-32 rounded-xl"></div>
                <div class="bg-orange-300 h-32 rounded-xl"></div>
                <div class="bg-orange-300 h-32 rounded-xl"></div>
                <div class="bg-orange-300 h-32 rounded-xl"></div>
                <div class="bg-orange-300 h-32 rounded-xl"></div>
                <div class="bg-orange-300 h-32 rounded-xl"></div>
                <div class="bg-orange-300 h-32 rounded-xl"></div>
            </div>

        </div>
    </div>

    <!-- FOOTER -->
    <footer>
        This is footer
    </footer>

</body>
</html>
