<!DOCTYPE html>
<html>
<head>
    <title>Auth Demo</title>
    <style>body { font-family: sans-serif; padding: 20px; } input { display: block; margin: 10px 0; }</style>
</head>
<body>
    <h2>FastAPI Auth</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    
    <button onclick="handleAuth('/register')">Register</button>
    <button onclick="handleAuth('/token')">Login</button>
    <button onclick="window.location.href='/login/google'">Login with Google</button>

    <p id="msg"></p>

    <script>
        async function handleAuth(endpoint) {
            const formData = new URLSearchParams();
            formData.append('username', document.getElementById("username").value);
            formData.append('password', document.getElementById("password").value);

            const response = await fetch(endpoint, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: formData
            });

            const data = await response.json();
            if (response.ok) {
                document.getElementById("msg").innerText = data.access_token ? "Logged in! " : data.message;
            } else {
                document.getElementById("msg").innerText = "Error: " + data.detail;
            }
        }
    </script>
</body>
</html>
